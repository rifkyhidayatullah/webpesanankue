<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Order History</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #5b0043;
    --accent: #ff48cf;
    --bg: #0f172a;
    --card: rgba(255, 255, 255, 0.05);
}

body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg);
    color: #f8fafc;
    background-image: radial-gradient(circle at top right, #2d0021, #0f172a);
    min-height: 100vh;
}

header {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(10px);
    padding: 25px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px 20px;
}

.back-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 30px;
    transition: all 0.3s;
}

.back-btn:hover { background: var(--accent); border-color: var(--accent); }

/* History Card */
.history-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 25px;
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: transform 0.3s;
}

.history-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.08); }

.customer-info h3 { margin: 0; font-size: 20px; color: var(--accent); }
.customer-info p { margin: 5px 0; font-size: 13px; color: #94a3b8; }

.order-items {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.item-tag {
    background: rgba(255, 255, 255, 0.1);
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,0.05);
}

.price-tag {
    text-align: right;
}

/* Redesign Tombol Back / Navigasi */
.btn-nav-galaxy {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 143, 171, 0.3);
    color: #fff;
    padding: 12px 28px;
    border-radius: 50px; /* Bikin lonjong biar elegan */
    
    /* Ganti Font jadi lebih berkarakter */
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 2px; /* Kasih jarak antar huruf biar estetik */
    text-transform: uppercase;
    
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
    overflow: hidden;
}

/* Efek Cahaya Pas Hover */
.btn-nav-galaxy:hover {
    background: var(--primary);
    color: #000;
    border-color: var(--primary);
    box-shadow: 0 0 30px rgba(255, 143, 171, 0.5);
    transform: translateX(-5px); /* Geser sedikit ke kiri pas mau 'Back' */
}

/* Icon Panah */
.btn-nav-galaxy .icon {
    font-size: 16px;
    transition: transform 0.3s ease;
}

.btn-nav-galaxy:hover .icon {
    transform: scale(1.2);
}

.total-amt { font-size: 22px; font-weight: 700; display: block; }
.status-badge {
    background: #10b981;
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
}

.delete-btn {
    background: rgba(231, 76, 60, 0.2);
    color: #ff7675;
    border: 1px solid rgba(231, 76, 60, 0.3);
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
    margin-left: 20px;
}
</style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size:24px; letter-spacing:-1px;">💎 Exclusive History</h1>
</header>

<div class="container">
    <div style="margin-bottom: 30px;">
    <button class="btn-nav-galaxy" onclick="location.href='index.html'">
        <span class="icon">❮</span>
        <span>Back to Galaxy Hub</span>
    </button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkzEGvVEv-jF-Qg9qGemIAgRSeqQdcThc",
  authDomain: "pesanankue.firebaseapp.com",
  projectId: "pesanankue"
});
const db = getFirestore(app);
const colRef = collection(db, "riwayat_pesanan");

const hargaMap = {
  "500 ml": { "Nastar Keju": 60000, "Nastar Klasik": 60000, "Sagu Keju": 55000, "Kastengel": 55000, "Choco Rocher": 60000, "Oreo Button": 55000, "Thumbprint Choco": 50000, "Mini Cookies": 45000, "Mini Brownie Cup": 45000, "Putri Salju": 45000 },
  "800 ml": { "Nastar Keju": 75000, "Nastar Klasik": 75000, "Sagu Keju": 70000, "Kastengel": 75000, "Choco Rocher": 80000, "Oreo Button": 75000, "Thumbprint Choco": 60000, "Mini Cookies": 55000, "Mini Brownie Cup": 55000, "Putri Salju": 55000 },
  "1000 ml": { "Nastar Keju": 95000, "Nastar Klasik": 95000, "Sagu Keju": 85000, "Kastengel": 90000, "Choco Rocher": 98000, "Oreo Button": 98000, "Thumbprint Choco": 90000, "Mini Cookies": 75000, "Mini Brownie Cup": 80000, "Putri Salju": 90000 }
};

async function loadHistory() {
    const container = document.getElementById("listHistory");
    container.innerHTML = "";
    const snap = await getDocs(colRef);
    
    snap.forEach(d => {
        const t = d.data();
        let grandTotal = 0;
        t.items.forEach(i => {
            const q = parseInt(i.qty || i.jumlah || 0);
            const h = hargaMap[i.ukuran]?.[i.jenis] || 0;
            grandTotal += (h * q);
        });

        container.innerHTML += `
            <div class="history-card">
                <div class="customer-info">
                    <span class="status-badge">Completed</span>
                    <h3>${t.nama}</h3>
                    <p>📅 Selesai pada: ${t.waktuSelesai ? new Date(t.waktuSelesai).toLocaleDateString('id-ID') : t.tanggalAntar}</p>
                    <div class="order-items">
                        ${t.items.map(i => `<span class="item-tag">🍪 ${i.jenis} (${i.qty || i.jumlah}x)</span>`).join("")}
                    </div>
                </div>
                <div style="display:flex; align-items:center;">
                    <div class="price-tag">
                        <small style="color:#94a3b8">Total Paid</small>
                        <span class="total-amt">Rp ${grandTotal.toLocaleString()}</span>
                    </div>
                    <button class="delete-btn" onclick="hapus('${d.id}')">🗑️</button>
                </div>
            </div>
        `;
    });
}
loadHistory();

window.hapus = async (id) => {
    if(!confirm("Hapus permanen dari riwayat?")) return;
    await deleteDoc(doc(db, "riwayat_pesanan", id));
    loadHistory();
};
</script>
</body>
</html>
