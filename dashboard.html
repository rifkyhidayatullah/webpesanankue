<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Sales Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-galaxy: #0a0a1a;
    --card-galaxy: rgba(20, 20, 45, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --primary-neon: #ff48cf;
    --secondary-neon: #00d4ff;
    --text-bright: #f0f0f7;
    --text-muted: #a0a0c0;
    --galaxy-gradient: linear-gradient(135deg, #2d0036 0%, #001233 100%);
}

body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg-galaxy);
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 72, 207, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.05) 0%, transparent 40%);
    color: var(--text-bright);
    line-height: 1.6;
}

/* Tambahkan ini untuk tombol spesifik 'Kembali' */
.action-bar button:first-child {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--secondary-neon);
    color: var(--secondary-neon);
}

.action-bar button:first-child:hover {
    background: var(--secondary-neon);
    color: #000;
    box-shadow: 0 0 15px var(--secondary-neon);
}

header {
    background: rgba(10, 10, 26, 0.8);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--glass-border);
    color: var(--primary-neon);
    padding: 25px;
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(255, 72, 207, 0.5);
}

.container {
    max-width: 1300px;
    margin: auto;
    padding: 30px 20px;
}

/* Glassmorphism Card */
.card {
    background: var(--card-galaxy);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    margin-bottom: 30px;
    transition: all 0.3s ease;
}

/* Perbaikan Modal Detail Agar ke Tengah */
#modalDetail {
    display: none; /* Default sembunyi, diubah jadi flex via JS */
    position: fixed; 
    z-index: 9999; 
    left: 0;
    top: 0;
    width: 100%; 
    height: 100%;
    background-color: rgba(5, 5, 15, 0.8); /* Overlay gelap transparan */
    backdrop-filter: blur(8px);
    justify-content: center; /* Horisontal ke tengah */
    align-items: center;     /* Vertikal ke tengah */
}

.modal-content {
    background: #0f0f2d !important;
    border: 1px solid var(--primary-neon) !important;
    padding: 30px;
    width: 90%;
    max-width: 500px;
    border-radius: 24px;
    position: relative;
    box-shadow: 0 0 50px rgba(255, 72, 207, 0.2);
    animation: modalMuncul 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Animasi muncul biar keren */
@keyframes modalMuncul {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

.close-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    transition: 0.3s;
}

.close-modal:hover {
    color: var(--primary-neon) !important;
    transform: rotate(90deg);
}

.card:hover {
    border-color: rgba(255, 72, 207, 0.3);
    transform: translateY(-5px);
}

h3 {
    margin-top: 0;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--secondary-neon);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 25px;
}

/* Animasi untuk Tombol Back & Action Buttons */
button {
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    letter-spacing: 1px;
}

button:active {
    transform: scale(0.95);
}

/* Memperbaiki Konten di dalam Modal Detail */
.modal-content {
    background: #0f0f2d !important; /* Warna Deep Space */
    border: 1px solid var(--secondary-neon) !important;
    color: var(--text-bright) !important;
    box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
}

.modal-content h2 {
    color: var(--primary-neon) !important;
    text-shadow: 0 0 10px rgba(255, 72, 207, 0.5);
}

/* Tabel di dalam Modal agar tidak berantakan */
.modal-content table {
    border-collapse: collapse !important;
    margin-top: 15px;
}

.modal-content td, .modal-content th {
    background: rgba(255, 255, 255, 0.05) !important;
    border: 1px solid var(--glass-border) !important;
    color: #fff !important;
    padding: 12px !important;
    border-radius: 0 !important; /* Reset border radius kartu di modal */
}

/* Bagian Keuangan di Modal */
#detailKeuangan {
    background: rgba(0, 0, 0, 0.3);
    padding: 20px;
    border-radius: 15px;
    border: 1px solid var(--glass-border);
}

#detailKeuangan strong, #detailKeuangan span {
    color: #fff !important;
}

/* Galaxy Summary Boxes */
.summary-box {
    background: linear-gradient(135deg, rgba(255, 72, 207, 0.15), rgba(0, 212, 255, 0.15));
    border: 1px solid var(--glass-border);
    color: white;
    padding: 22px;
    border-radius: 20px;
    text-align: center;
    transition: 0.3s;
}

.summary-box span {
    font-size: 28px;
    font-weight: 800;
    display: block;
    color: #fff;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
}

.jenis-box {
    background: rgba(255, 255, 255, 0.03);
    padding: 15px;
    border-radius: 16px;
    border: 1px solid var(--glass-border);
    border-left: 4px solid var(--primary-neon);
}

/* Inputs & Buttons */
button {
    background: rgba(255, 255, 255, 0.05);
    color: white;
    border: 1px solid var(--glass-border);
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 600;
    transition: 0.3s;
}

button.primary {
    background: linear-gradient(45deg, var(--primary-neon), #8e0066);
    border: none;
    box-shadow: 0 5px 15px rgba(255, 72, 207, 0.3);
}

select {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    background: #1a1a3a;
    color: white;
}

/* Table Design */
.table-wrapper {
    background: transparent;
    border-radius: 15px;
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px; /* Memberi jarak antar baris */
}

th {
    background: transparent;
    color: var(--text-muted);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 11px;
    padding: 15px;
}

td {
    background: rgba(255, 255, 255, 0.02);
    padding: 18px 15px;
    border-top: 1px solid var(--glass-border);
    border-bottom: 1px solid var(--glass-border);
    font-size: 14px;
}

/* --- Tambahkan Bagian Ini di dalam <style> --- */

/* Memperbaiki Tombol & Navigasi Atas */
.action-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
    gap: 15px;
}

/* Memperbaiki Layout Chart (Biar nggak raksasa) */
.charts-grid {
    display: grid;
    grid-template-columns: 1fr 1.5fr; /* Membagi kolom kiri & kanan */
    gap: 25px;
    margin-bottom: 30px;
}

/* Membatasi Tinggi Canvas Chart */
canvas {
    max-height: 280px !important; /* Paksa biar nggak ketinggian */
    width: 100% !important;
}

/* Badge grouping di tabel */
.item-count-badge {
    background: var(--primary-neon);
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    box-shadow: 0 0 10px rgba(255, 72, 207, 0.3);
}

/* Responsif untuk HP */
@media(max-width: 992px) {
    .charts-grid { grid-template-columns: 1fr; }
    .action-bar { flex-direction: column; }
}

td:first-child { border-left: 1px solid var(--glass-border); border-radius: 15px 0 0 15px; }
td:last-child { border-right: 1px solid var(--glass-border); border-radius: 0 15px 15px 0; }

/* Modal Detail */
.modal-content {
    background: #0f0f2d;
    border: 1px solid var(--primary-neon);
    color: white;
    border-radius: 30px;
}
</style>
</head>

<body>

<header>📊 Dashboard Penjualan</header>

<div class="container">

    <div class="action-bar">
        <button onclick="location.href='index.html'">⬅️ Kembali</button>
        <button class="primary" onclick="exportExcel()">📥 Export Excel</button>
    </div>

    <!-- GRAFIK GRID -->
    <div class="charts-grid">
        <div class="card">
            <h3>📈 Penjualan per Jenis</h3>
            <canvas id="chartJenis"></canvas>
        </div>
        <div class="card">
            <h3>📊 Penjualan per Ukuran</h3>
            <canvas id="chartUkuran"></canvas>
        </div>
    </div>

    <!-- SUMMARY -->
    <div class="card">
        <h3>✨ Ringkasan Eksekutif</h3>
        <div id="summaryGlobal" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px; margin-bottom:30px;">
            <!-- Render via JS -->
        </div>

        <h4 style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">TOTAL PER JENIS KUE</h4>
        <div id="summaryJenis" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px;">
            <!-- Render via JS -->
        </div>
    </div>

    <!-- FILTER + TABEL -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;">
            <h3 style="margin: 0;">🔍 Klasifikasi Pesanan</h3>
            <div style="display: flex; gap: 10px;">
                <select id="filterUkuran" onchange="renderTable()">
                    <option value="">Semua Ukuran</option>
                    <option value="500 ml">500 ml</option>
                    <option value="800 ml">800 ml</option>
                    <option value="1000 ml">1000 ml</option>
                </select>
                <select id="filterJenis" onchange="renderTable()">
                    <option value="">Semua Jenis</option>
                    <option>Nastar Keju</option>
                    <option>Nastar Klasik</option>
                    <option>Sagu Keju</option>
                    <option>Kastengel</option>
                    <option>Choco Rocher</option>
                    <option>Oreo Button</option>
                    <option>Thumbprint Choco</option>
                    <option>Mini Cookies</option>
                    <option>Mini Brownie Cup</option>
                    <option>Putri Salju</option>
                </select>
            </div>
        </div>

        <div class="table-wrapper">
            <table id="tabelData">
                <thead>
                    <tr>
                        <th>Nama Pemesan</th>
                        <th>Varian</th>
                        <th>Size</th>
                        <th>Qty</th>
                        <th>Harga</th>
                        <th>Subtotal</th>
                        <th>DP Masuk</th>
                        <th>Sisa Tagihan</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tabelKlasifikasi"></tbody>
            </table>
        </div>
    </div>

</div>
<div id="modalDetail">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()" style="color: var(--text-bright)">&times;</span>
        <h2 id="detailNama"></h2>
        <p id="detailInfo" style="color: var(--text-muted) !important;"></p>
        
        <div class="table-wrapper" style="max-height: 300px; margin-bottom: 20px;">
            <table>
                <thead>
                    <tr>
                        <th>Jenis Kue</th>
                        <th>Ukuran</th>
                        <th>Qty</th>
                    </tr>
                </thead>
                <tbody id="detailItemsBody"></tbody>
            </table>
        </div>
        
        <div id="detailKeuangan">
            <!-- Render via JS -->
        </div>
    </div>
</div>
<script type="module">
// - Logika Firebase & Data Tetap Sama
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyCkzEGvVEv-jF-Qg9qGemIAgRSeqQdcThc",
    authDomain: "pesanankue.firebaseapp.com",
    projectId: "pesanankue"
});
const db = getFirestore(app);
const colRef = collection(db, "transaksi");

let cache = [];
const hargaMap = {
  "500 ml": { "Nastar Keju": 60000, "Nastar Klasik": 60000, "Sagu Keju": 55000, "Kastengel": 55000, "Choco Rocher": 60000, "Oreo Button": 55000, "Thumbprint Choco": 50000, "Mini Cookies": 45000, "Mini Brownie Cup": 45000, "Putri Salju": 45000 },
  "800 ml": { "Nastar Keju": 75000, "Nastar Klasik": 75000, "Sagu Keju": 70000, "Kastengel": 75000, "Choco Rocher": 80000, "Oreo Button": 75000, "Thumbprint Choco": 60000, "Mini Cookies": 55000, "Mini Brownie Cup": 55000, "Putri Salju": 55000 },
  "1000 ml": { "Nastar Keju": 95000, "Nastar Klasik": 95000, "Sagu Keju": 85000, "Kastengel": 90000, "Choco Rocher": 98000, "Oreo Button": 98000, "Thumbprint Choco": 90000, "Mini Cookies": 75000, "Mini Brownie Cup": 80000, "Putri Salju": 90000 }
};

async function loadData() {
    const snap = await getDocs(colRef);
    cache = [];
    snap.forEach(doc => {
        let data = doc.data();
        data.id = doc.id;
        cache.push(data);
    });
    renderSummary();
    renderTable();
    renderCharts();
}
loadData();

function renderSummary() {
    let totalPemesan = cache.length;
    let totalProduk = 0;
    let ukuranTotal = { "500 ml": 0, "800 ml": 0, "1000 ml": 0 };
    let jenisTotal = {};

    cache.forEach(t => {
        if (!t.items) return;
        t.items.forEach(i => {
            const qty = parseInt(i.qty || i.jumlah || 0); // FIX NAN: Cek qty atau jumlah
            totalProduk += qty;
            if (ukuranTotal[i.ukuran] !== undefined) ukuranTotal[i.ukuran] += qty;
            jenisTotal[i.jenis] = (jenisTotal[i.jenis] || 0) + qty;
        });
    });

    document.getElementById("summaryGlobal").innerHTML = `
        <div class="summary-box"><small>Total Pemesan</small><span>${totalPemesan}</span></div>
        <div class="summary-box"><small>Produk Terjual</small><span>${totalProduk}</span></div>
        <div class="summary-box"><small>500 ml</small><span>${ukuranTotal["500 ml"]}</span></div>
        <div class="summary-box"><small>800 ml</small><span>${ukuranTotal["800 ml"]}</span></div>
        <div class="summary-box"><small>1000 ml</small><span>${ukuranTotal["1000 ml"]}</span></div>
    `;

    const sj = document.getElementById("summaryJenis");
    sj.innerHTML = "";
    Object.keys(jenisTotal).forEach(j => {
        sj.innerHTML += `<div class="jenis-box"><strong>${j}</strong><br><small>${jenisTotal[j]} pcs</small></div>`;
    });
}

let chartJenis, chartUkuran; // Variabel global untuk menyimpan instance chart

function renderCharts() {
    let jenisTotal = {};
    let ukuranTotal = { "500 ml": 0, "800 ml": 0, "1000 ml": 0 };

    cache.forEach(t => {
        if (!t.items) return;
        t.items.forEach(i => {
            const qty = parseInt(i.qty || i.jumlah || 0); // Pastikan pakai logika yang sama agar tidak NaN
            jenisTotal[i.jenis] = (jenisTotal[i.jenis] || 0) + qty;
            if (ukuranTotal[i.ukuran] !== undefined) ukuranTotal[i.ukuran] += qty;
        });
    });

    // Reset chart kalau sudah ada agar tidak error saat reload
    if (chartJenis) chartJenis.destroy();
    if (chartUkuran) chartUkuran.destroy();

    // Grafik Doughnut - Penjualan per Jenis
    chartJenis = new Chart(document.getElementById("chartJenis"), {
        type: "doughnut",
        data: {
            labels: Object.keys(jenisTotal),
            datasets: [{
                data: Object.values(jenisTotal),
                backgroundColor: ['#5b0043', '#ff48cf', '#8e0066', '#cbd5e1', '#64748b', '#1e293b']
            }]
        },
        options: { 
            responsive: true,
            plugins: { legend: { position: 'bottom' } } 
        }
    });

    // Grafik Bar - Penjualan per Ukuran
    chartUkuran = new Chart(document.getElementById("chartUkuran"), {
        type: "bar",
        data: {
            labels: Object.keys(ukuranTotal),
            datasets: [{
                label: "Total Pcs",
                data: Object.values(ukuranTotal),
                backgroundColor: '#ff48cf',
                borderRadius: 8
            }]
        },
        options: { 
            responsive: true,
            scales: { y: { beginAtZero: true } } 
        }
    });
}

window.renderTable = function() {
    const tbody = document.getElementById("tabelKlasifikasi");
    tbody.innerHTML = "";

    cache.forEach((t, index) => {
        let totalBelanja = 0;
        let totalQty = 0;
        
        t.items.forEach(i => {
            const q = parseInt(i.qty || i.jumlah || 0);
            const h = hargaMap[i.ukuran]?.[i.jenis] || 0;
            totalBelanja += (h * q);
            totalQty += q;
        });

        const dp = parseInt(t.nominalDP || 0);
        const sisa = totalBelanja - dp;

        tbody.innerHTML += `
            <tr>
<td style="font-weight:700; color:var(--secondary-neon)">${t.nama}</td>
                <td><span class="item-count-badge">${t.items.length} Macam Kue</span></td>
                <td>Campuran</td>
                <td>${totalQty} Pcs</td>
                <td>-</td>
                <td style="font-weight:600">Rp ${totalBelanja.toLocaleString()}</td>
                <td style="color:#166534">Rp ${dp.toLocaleString()}</td>
                <td style="font-weight:700; color:#991b1b">Rp ${sisa > 0 ? sisa.toLocaleString() : 0}</td>
                <td>
                    <button onclick="showDetail(${index})" style="background:#5b0043; color:white; padding:5px 12px; font-size:11px;">
                        👁️ Detail
                    </button>
                </td>
            </tr>
        `;
    });
}

window.showDetail = function(idx) {
    const data = cache[idx];
    const modal = document.getElementById("modalDetail");
    document.getElementById("detailNama").innerText = data.nama;
    document.getElementById("detailInfo").innerText = `Tanggal Antar: ${data.tanggalAntar || '-'}`;
    
    const itemsBody = document.getElementById("detailItemsBody");
    itemsBody.innerHTML = "";
    
    let subtotal = 0;
    data.items.forEach(i => {
        const q = parseInt(i.qty || i.jumlah || 0);
        const h = hargaMap[i.ukuran]?.[i.jenis] || 0;
        subtotal += (h * q);
        itemsBody.innerHTML += `
            <tr>
                <td>${i.jenis}</td>
                <td>${i.ukuran}</td>
                <td>${q}</td>
            </tr>
        `;
    });

    const dp = parseInt(data.nominalDP || 0);
    const sisa = subtotal - dp;

    document.getElementById("detailKeuangan").innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span>Total Belanja:</span> <strong>Rp ${subtotal.toLocaleString()}</strong>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:5px; color:#166534;">
            <span>DP Masuk:</span> <strong>Rp ${dp.toLocaleString()}</strong>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:18px; color:#991b1b; font-weight:800;">
            <span>Sisa Tagihan:</span> <span>Rp ${sisa > 0 ? sisa.toLocaleString() : 0}</span>
        </div>
    `;
    
    modal.style.display = "flex";
}

window.closeModal = () => document.getElementById("modalDetail").style.display = "none";
window.onclick = (e) => { if(e.target == document.getElementById("modalDetail")) closeModal(); }

window.exportExcel = function() {
    XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelData")), "Laporan_Kue.xlsx");
}
</script>

</body>
</html>
